name: build private YoyoBoot source

on:
  repository_dispatch:
    types:
      - yoyoboot-build-request

# The public repository never needs a writable GITHUB_TOKEN. Private-source
# access uses a repository-scoped, read-only Fine-grained PAT secret.
permissions: {}

concurrency:
  group: yoyoboot-public-build-${{ github.event.client_payload.source_sha || github.run_id }}
  cancel-in-progress: false

jobs:
  validate-request:
    runs-on: ubuntu-24.04
    outputs:
      source_repository: ${{ steps.validate.outputs.source_repository }}
      source_ref: ${{ steps.validate.outputs.source_ref }}
      source_sha: ${{ steps.validate.outputs.source_sha }}

    steps:
      - name: Validate signed request
        id: validate
        shell: bash
        env:
          EXPECTED_SOURCE_REPOSITORY: ${{ secrets.PRIVATE_SOURCE_REPOSITORY }}
          DISPATCH_HMAC_SECRET: ${{ secrets.PRIVATE_BUILD_DISPATCH_HMAC_SECRET }}
          PROTOCOL: ${{ github.event.client_payload.protocol }}
          SOURCE_REPOSITORY: ${{ github.event.client_payload.source_repository }}
          SOURCE_REF: ${{ github.event.client_payload.source_ref }}
          SOURCE_SHA: ${{ github.event.client_payload.source_sha }}
          SOURCE_RUN_ID: ${{ github.event.client_payload.source_run_id }}
          SOURCE_RUN_ATTEMPT: ${{ github.event.client_payload.source_run_attempt }}
          ISSUED_AT: ${{ github.event.client_payload.issued_at }}
          NONCE: ${{ github.event.client_payload.nonce }}
          SIGNATURE: ${{ github.event.client_payload.signature }}
        run: |
          set -euo pipefail
          [[ -n "$EXPECTED_SOURCE_REPOSITORY" ]] || { echo 'Variable PRIVATE_SOURCE_REPOSITORY is required.' >&2; exit 1; }
          [[ -n "$DISPATCH_HMAC_SECRET" ]] || { echo 'Secret PRIVATE_BUILD_DISPATCH_HMAC_SECRET is required.' >&2; exit 1; }

          export EXPECTED_SOURCE_REPOSITORY DISPATCH_HMAC_SECRET PROTOCOL SOURCE_REPOSITORY SOURCE_REF SOURCE_SHA SOURCE_RUN_ID SOURCE_RUN_ATTEMPT ISSUED_AT NONCE SIGNATURE
          python3 - <<'PY'
          import base64
          import hashlib
          import hmac
          import os
          import re
          import sys
          from datetime import datetime, timezone

          values = {name: os.environ[name] for name in (
              'PROTOCOL', 'SOURCE_REPOSITORY', 'SOURCE_REF', 'SOURCE_SHA',
              'SOURCE_RUN_ID', 'SOURCE_RUN_ATTEMPT', 'ISSUED_AT', 'NONCE', 'SIGNATURE')}
          if values['PROTOCOL'] != 'yoyoboot-public-build/v1':
              sys.exit('Unsupported dispatch protocol.')
          if values['SOURCE_REPOSITORY'] != os.environ['EXPECTED_SOURCE_REPOSITORY']:
              sys.exit('Dispatch source repository is not the configured private source.')
          if not re.fullmatch(r'[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+', values['SOURCE_REPOSITORY']):
              sys.exit('Invalid source repository.')
          if not re.fullmatch(r'refs/heads/[A-Za-z0-9._/-]+', values['SOURCE_REF']):
              sys.exit('Only branch refs are accepted.')
          if not re.fullmatch(r'[0-9a-f]{40}', values['SOURCE_SHA']):
              sys.exit('Invalid source SHA.')
          if not re.fullmatch(r'[1-9][0-9]*', values['SOURCE_RUN_ID']):
              sys.exit('Invalid source run id.')
          if not re.fullmatch(r'[1-9][0-9]*', values['SOURCE_RUN_ATTEMPT']):
              sys.exit('Invalid source run attempt.')
          if not re.fullmatch(r'[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}', values['NONCE']):
              sys.exit('Invalid dispatch nonce.')
          try:
              issued_at = datetime.fromisoformat(values['ISSUED_AT'].replace('Z', '+00:00'))
          except ValueError:
              sys.exit('Invalid dispatch timestamp.')
          if abs((datetime.now(timezone.utc) - issued_at).total_seconds()) > 600:
              sys.exit('Dispatch timestamp is outside the ten-minute acceptance window.')

          material = ''.join(f"{values[key]}\n" for key in (
              'PROTOCOL', 'SOURCE_REPOSITORY', 'SOURCE_REF', 'SOURCE_SHA',
              'SOURCE_RUN_ID', 'SOURCE_RUN_ATTEMPT', 'ISSUED_AT', 'NONCE'))
          expected = base64.b64encode(hmac.new(
              os.environ['DISPATCH_HMAC_SECRET'].encode(), material.encode(), hashlib.sha256).digest()).decode()
          if not hmac.compare_digest(expected, values['SIGNATURE']):
              sys.exit('Dispatch signature is invalid.')
          PY

          {
            echo "source_repository=$SOURCE_REPOSITORY"
            echo "source_ref=$SOURCE_REF"
            echo "source_sha=$SOURCE_SHA"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: validate-request
    runs-on: ubuntu-24.04
    env:
      SOURCE_REPOSITORY: ${{ needs.validate-request.outputs.source_repository }}
      SOURCE_REF: ${{ needs.validate-request.outputs.source_ref }}
      SOURCE_SHA: ${{ needs.validate-request.outputs.source_sha }}

    steps:
      - name: Check out requested private source revision
        uses: actions/checkout@v6
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          ref: ${{ env.SOURCE_SHA }}
          token: ${{ secrets.PRIVATE_SOURCE_PAT }}
          path: source
          fetch-depth: 1
          persist-credentials: false

      - name: Verify source branch still points to requested commit
        shell: bash
        env:
          SOURCE_READ_TOKEN: ${{ secrets.PRIVATE_SOURCE_PAT }}
        run: |
          set -euo pipefail
          [[ -n "$SOURCE_READ_TOKEN" ]] || {
            echo 'Secret PRIVATE_SOURCE_PAT is required.' >&2
            exit 1
          }
          [[ "$(git -C source rev-parse HEAD)" == "$SOURCE_SHA" ]] || {
            echo 'Checked-out commit differs from the signed dispatch SHA.' >&2
            exit 1
          }
          remote_sha="$(curl --fail-with-body --silent --show-error \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer ${SOURCE_READ_TOKEN}" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "${GITHUB_API_URL}/repos/${SOURCE_REPOSITORY}/commits/${SOURCE_REF}" | jq -r '.sha')"
          [[ "$remote_sha" == "$SOURCE_SHA" ]] || {
            echo "Source ref $SOURCE_REF no longer points to $SOURCE_SHA." >&2
            exit 1
          }

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          cache: true
          cache_dependency_path: |
            source/packages/basic-module-vue/pnpm-lock.yaml
            source/packages/yoyo-admin/api-client/pnpm-lock.yaml
            source/packages/yoyo-admin/contract-core/pnpm-lock.yaml
            source/apps/yoyo-admin/admin-vue/pnpm-lock.yaml

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Build, test and package private source
        shell: pwsh
        working-directory: source
        run: ./scripts/public-build-runner/Invoke-YoyoBootPublicBuild.ps1 -OutputDirectory "$env:RUNNER_TEMP/yoyoboot-public-build"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yoyoboot-${{ env.SOURCE_SHA }}
          path: ${{ runner.temp }}/yoyoboot-public-build
          if-no-files-found: error

      - name: Write build summary
        shell: bash
        run: |
          {
            echo '## Private source build completed'
            echo
            echo "- source: \`${SOURCE_REPOSITORY}@${SOURCE_SHA}\`"
            echo "- ref: \`${SOURCE_REF}\`"
            echo "- artifact: \`yoyoboot-${SOURCE_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"
